# AnalysisTemplate with a single long-running nginx job
# constrained by activeDeadlineSeconds. The job is terminated by the deadline,
# which should be marked as Failed
kind: AnalysisTemplate
apiVersion: argoproj.io/v1alpha1
metadata:
  name: long-running-job-deadline
spec:
  metrics:
  - name: long-running-job-deadline-metric
    count: 1
    provider:
      job:
        spec:
          activeDeadlineSeconds: 10
          template:
            spec:
              containers:
              - name: long-running-job
                image: nginx:1.19-alpine
                command: [sh, -c]
                args: ["sleep 6000"]
              restartPolicy: Never
          backoffLimit: 0
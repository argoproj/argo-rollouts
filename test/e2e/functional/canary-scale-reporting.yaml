apiVersion: v1
kind: Service
metadata:
  name: canary-scale-reporting-root
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: canary-scale-reporting
---
apiVersion: v1
kind: Service
metadata:
  name: canary-scale-reporting-canary
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: canary-scale-reporting
---
apiVersion: v1
kind: Service
metadata:
  name: canary-scale-reporting-stable
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: canary-scale-reporting
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: canary-scale-reporting-ingress
  annotations:
    kubernetes.io/ingress.class: alb
spec:
  rules:
  - http:
      paths:
      - path: /*
        pathType: Prefix
        backend:
          service:
            name: canary-scale-reporting-root
            port:
              name: use-annotation
---
# The HPA is pinned to min=max=2 replicas so it never rescales the Rollout during the
# test regardless of metric availability, while still exercising the real HPA
# controller reading the Rollout's scale subresource
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: canary-scale-reporting
spec:
  minReplicas: 2
  maxReplicas: 2
  scaleTargetRef:
    apiVersion: argoproj.io/v1alpha1
    kind: Rollout
    name: canary-scale-reporting
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: canary-scale-reporting
spec:
  replicas: 2
  selector:
    matchLabels:
      app: canary-scale-reporting
  template:
    metadata:
      labels:
        app: canary-scale-reporting
    spec:
      containers:
      - name: canary-scale-reporting
        image: nginx:1.19-alpine
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        resources:
          requests:
            memory: 16Mi
            cpu: 5m
  strategy:
    canary:
      canaryService: canary-scale-reporting-canary
      stableService: canary-scale-reporting-stable
      trafficRouting:
        alb:
          ingress: canary-scale-reporting-ingress
          rootService: canary-scale-reporting-root
          servicePort: 80
      steps:
      - setWeight: 50
      - pause: {}

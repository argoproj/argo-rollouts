# statsig-io fork: slim PR CI. Upstream's workflows (E2E, docker publish,
# goreleaser, pages, ...) need argoproj infra/secrets and only produce red
# noise here, so they are removed on this branch; this covers our actual
# change surface instead.
name: statsig CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: ['release-*-statsig']

jobs:
  build-test:
    if: github.repository == 'statsig-io/argo-rollouts'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.21'
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./server/... ./pkg/kubectl-argo-rollouts/info/...
      - name: Unit tests (server + info)
        run: go test ./server/... ./pkg/kubectl-argo-rollouts/info/...

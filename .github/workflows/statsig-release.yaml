# statsig-io fork: builds the dashboard plugin binary (UI embedded) and
# attaches it to a GitHub Release, for consumption by the
# statsig-io/kubectl-via-gcloud image build.
#
# Trigger: push a tag like v1.6.4-statsig.1 (cut from release-1.6.4-statsig).
name: Build statsig dashboard release

on:
  workflow_dispatch:
  push:
    tags: ['v*-statsig*']

permissions:
  contents: write

jobs:
  build:
    if: github.repository == 'statsig-io/argo-rollouts'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '18'
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.21'
      # make plugin = yarn ui build -> cp into server/static -> go build
      - run: make plugin
      - run: mv dist/kubectl-argo-rollouts dist/kubectl-argo-rollouts-linux-amd64
      - name: Attach binary to release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/kubectl-argo-rollouts-linux-amd64
          generate_release_notes: false
